<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI PDF Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px; }
    h1 { color: #7c6af7; margin-bottom: 8px; }
    p.sub { color: #888; margin-bottom: 24px; font-size: 14px; }

    .upload-box { background: #1a1a2e; border: 2px dashed #7c6af7; border-radius: 12px; padding: 24px 40px; text-align: center; width: 100%; max-width: 600px; margin-bottom: 24px; }
    .upload-box input { display: none; }
    .upload-box label { cursor: pointer; color: #7c6af7; font-weight: bold; font-size: 15px; }
    #file-name { margin-top: 10px; font-size: 13px; color: #aaa; }
    .upload-btn { margin-top: 14px; background: #7c6af7; color: white; border: none; padding: 10px 28px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .upload-btn:hover { background: #6a59e0; }

    .chat-box { background: #1a1a2e; border-radius: 12px; width: 100%; max-width: 600px; height: 360px; overflow-y: auto; padding: 16px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 14px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.5; }
    .msg.user { background: #7c6af7; align-self: flex-end; }
    .msg.bot { background: #2a2a40; align-self: flex-start; }
    .msg.bot .sources { margin-top: 8px; font-size: 11px; color: #aaa; border-top: 1px solid #444; padding-top: 6px; }

    .input-row { display: flex; gap: 10px; width: 100%; max-width: 600px; }
    .input-row input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; }
    .input-row button { background: #7c6af7; color: white; border: none; padding: 12px 22px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .input-row button:hover { background: #6a59e0; }
    #status { margin-top: 12px; font-size: 13px; color: #7c6af7; }
  </style>
</head>
<body>

  <h1>🧠 AI PDF Chatbot</h1>
  <p class="sub">Upload a PDF and ask anything about it</p>

  <!-- Upload Section -->
  <div class="upload-box">
    <input type="file" id="pdf-input" accept=".pdf" onchange="showFileName()" />
    <label for="pdf-input">📄 Click to choose a PDF</label>
    <div id="file-name">No file selected</div>
    <button class="upload-btn" onclick="uploadPDF()">Upload & Index</button>
  </div>

  <!-- Chat Section -->
  <div class="chat-box" id="chat-box"></div>

  <div class="input-row">
    <input type="text" id="question-input" placeholder="Ask a question about your PDF..." onkeydown="if(event.key==='Enter') sendQuestion()" />
    <button onclick="sendQuestion()">Ask</button>
  </div>

  <div id="status"></div>

  <script>
    const API = "http://localhost:8000";

    function showFileName() {
      const file = document.getElementById("pdf-input").files[0];
      document.getElementById("file-name").textContent = file ? file.name : "No file selected";
    }

    async function uploadPDF() {
      const file = document.getElementById("pdf-input").files[0];
      if (!file) { setStatus("Please select a PDF first."); return; }

      setStatus("Uploading and indexing... this may take a few seconds ⏳");
      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        setStatus(data.message || data.detail);
      } catch (e) {
        setStatus("Upload failed. Is the backend running?");
      }
    }

    async function sendQuestion() {
      const input = document.getElementById("question-input");
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";

      try {
        const res = await fetch(`${API}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        if (data.detail) { addMessage(data.detail, "bot"); return; }

        const sourcesHTML = data.sources
          ? `<div class="sources"><b>Sources:</b><br>${data.sources.map(s => `• ${s}...`).join("<br>")}</div>`
          : "";
        addMessage(data.answer, "bot", sourcesHTML);
      } catch (e) {
        addMessage("Error reaching the backend.", "bot");
      }
    }

    function addMessage(text, role, extra = "") {
      const box = document.getElementById("chat-box");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = text + extra;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }
  </script>
</body>
</html>
